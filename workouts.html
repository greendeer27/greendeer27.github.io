<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workouts | Weights Tracker</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h2>Weights Tracker</h2>
      <button id="closeSidebar">×</button>
    </div>

    <nav id="navLinks"></nav>

    <div class="sidebar-user">
      <span id="userEmail">Not signed in</span>
      <button id="signOutBtn" class="ghost-btn hidden">Sign Out</button>
    </div>
  </aside>

  <div id="overlay" class="overlay"></div>

  <main class="app">
    <header class="topbar">
      <button id="openSidebar" class="menu-btn">☰</button>
      <h1>Workouts</h1>
    </header>

    <section class="card">
      <h2>Add Workout</h2>

      <form id="workoutForm" class="form">
        <label>
          Machine
          <select id="machine" required></select>
        </label>

        <div class="target-preview">
          Current target weight:
          <strong id="currentTargetWeight">—</strong>
        </div>

        <label>
          Reps Completed
          <div class="slider-row">
            <input id="reps" type="range" min="0" max="36" value="0" step="1" />
            <strong id="repsValue">0</strong>
          </div>
        </label>

        <button type="submit">Save Workout</button>
      </form>
    </section>

    <section class="card">
      <h2>Today’s Workouts</h2>
      <div id="workoutList" class="list"></div>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>

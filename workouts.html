<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workouts | Gym Progress Tracker</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h2>LiftLog</h2>
      <button id="closeSidebar">×</button>
    </div>

    <nav id="navLinks"></nav>
  </aside>

  <div id="overlay" class="overlay"></div>

  <main class="app">
    <header class="topbar">
      <button id="openSidebar" class="menu-btn">☰</button>
      <h1>Workouts</h1>
    </header>

    <section class="card">
      <h2>Add Workout</h2>

      <form id="workoutForm" class="form">
        <input id="exercise" type="text" placeholder="Exercise" required />
        <input id="weight" type="number" placeholder="Weight" required />
        <input id="sets" type="number" placeholder="Sets" required />
        <input id="reps" type="number" placeholder="Reps" required />
        <textarea id="notes" placeholder="Notes"></textarea>

        <button type="submit">Save Workout</button>
      </form>
    </section>

    <section class="card">
      <h2>Recent Workouts</h2>
      <div id="workoutList" class="list"></div>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gym Progress Tracker</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h2>LiftLog</h2>
      <button id="closeSidebar">×</button>
    </div>

    <nav id="navLinks"></nav>
  </aside>

  <div id="overlay" class="overlay"></div>

  <main class="app">
    <header class="topbar">
      <button id="openSidebar" class="menu-btn">☰</button>
      <h1>Dashboard</h1>
    </header>

    <section class="hero card">
      <h2>Track your weight room progress</h2>
      <p>Log machines, reps, total volume, and automatic target-weight progression.</p>
    </section>

    <section class="grid">
      <div class="card stat">
        <span>Total Workouts</span>
        <strong id="totalWorkouts">0</strong>
      </div>

      <div class="card stat">
        <span>Total Pounds</span>
        <strong id="totalPounds">0</strong>
      </div>

      <div class="card stat">
        <span>Total Reps</span>
        <strong id="totalReps">0</strong>
      </div>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>

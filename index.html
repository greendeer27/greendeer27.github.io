<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weights Tracker</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h2>Weights Tracker</h2>
      <button id="closeSidebar">×</button>
    </div>

    <nav id="navLinks"></nav>

    <div class="sidebar-user">
      <span id="userEmail">Not signed in</span>
      <button id="signOutBtn" class="ghost-btn hidden">Sign Out</button>
    </div>
  </aside>

  <div id="overlay" class="overlay"></div>

  <main class="app">
    <header class="topbar">
      <button id="openSidebar" class="menu-btn">☰</button>
      <h1>Dashboard</h1>
    </header>

    <section id="authCard" class="auth-card card">
      <div>
        <h2>Sign in to Weights Tracker</h2>
        <p>Your workouts, targets, and progress will be saved under your account.</p>
      </div>

      <form id="authForm" class="form">
        <label>
          Email
          <input id="email" type="email" placeholder="you@example.com" required />
        </label>

        <label>
          Password
          <input id="password" type="password" placeholder="Password" required />
        </label>

        <div class="auth-actions">
          <button type="submit" id="signInBtn">Sign In</button>
          <button type="button" id="createAccountBtn" class="secondary-btn">Create Account</button>
        </div>

        <p id="authMessage" class="muted"></p>
      </form>
    </section>

    <section id="dashboardContent" class="hidden">
      <section class="hero card">
        <h2>Weights Tracker</h2>
        <p>Track your machines, reps, target weights, and progress over time.</p>
      </section>

      <section class="grid">
        <div class="card stat">
          <span>Total Workouts</span>
          <strong id="totalWorkouts">0</strong>
        </div>

        <div class="card stat">
          <span>Total Pounds</span>
          <strong id="totalPounds">0</strong>
        </div>

        <div class="card stat">
          <span>Total Reps</span>
          <strong id="totalReps">0</strong>
        </div>
      </section>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>

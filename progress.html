<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progress | Gym Progress Tracker</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h2>LiftLog</h2>
      <button id="closeSidebar">×</button>
    </div>

    <nav id="navLinks"></nav>
  </aside>

  <div id="overlay" class="overlay"></div>

  <main class="app">
    <header class="topbar">
      <button id="openSidebar" class="menu-btn">☰</button>
      <h1>Progress</h1>
    </header>

    <section class="grid">
      <div class="card stat">
        <span>Total Sessions</span>
        <strong id="progressSessions">0</strong>
      </div>

      <div class="card stat">
        <span>Total Volume</span>
        <strong id="progressVolume">0</strong>
      </div>

      <div class="card stat">
        <span>Average Reps / Workout</span>
        <strong id="progressAvgReps">0</strong>
      </div>
    </section>

    <section class="card">
      <h2>Machine Breakdown</h2>
      <div class="table-wrap">
        <table class="progress-table">
          <thead>
            <tr>
              <th>Machine</th>
              <th>Workouts</th>
              <th>Total Reps</th>
              <th>Total Volume</th>
              <th>Current Target</th>
              <th>Completion Rate</th>
            </tr>
          </thead>
          <tbody id="machineStatsTable"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h2>Volume Over Time</h2>
      <div id="volumeTimeline" class="timeline"></div>
    </section>

    <section class="card">
      <h2>Recent Training Days</h2>
      <div id="recentTrainingDays" class="list"></div>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
